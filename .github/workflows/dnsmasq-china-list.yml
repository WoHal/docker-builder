name: dnsmasq-china-list

on:
  schedule:
    - cron: '0 1 * * *' # every day at midnight

  workflow_dispatch:
    inputs:
      tags:
        description: 'Input dnsmasq-china-list tag'
        required: false
        type: string


jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clone Current Repository
        uses: actions/checkout@v6
      
      - name: Checkout dnsmasq-china-list Code
        uses: actions/checkout@v6
        with:
          repository: 'felixonmars/dnsmasq-china-list'
          path: 'dnsmasq-china-list'

      - name: Build for smartDNS
        run: |
          cd dnsmasq-china-list
          make SERVER=domestic SMARTDNS_SPEEDTEST_MODE=none smartdns-domain-rules

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update dnsmasq-china-list
          branch: main
          file_pattern: |
            dnsmasq-china-list/accelerated-domains.china.domain.smartdns.conf
            dnsmasq-china-list/google.china.domain.smartdns.conf
            dnsmasq-china-list/apple.china.domain.smartdns.conf